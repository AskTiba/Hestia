services:
  - type: web
    name: hestia-backend
    runtime: node
    plan: free
    buildCommand: cd backend && bun install && bun run build
    startCommand: cd backend && bun run start:prod
    envVars:
      - key: DATABASE_URL
        sync: false # Set this in the Render Dashboard
      - key: JWT_SECRET
        sync: false # Set this in the Render Dashboard
      - key: NODE_ENV
        value: production
